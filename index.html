<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --gold: #b8972a;
    --gold-light: #d4af5a;
    --gold-dim: #7a621c;
    --black: #080808;
    --dark: #111010;
    --dark2: #1a1815;
    --cream: #f0ead8;
    --cream2: #e8dfc8;
    --white: #faf8f4;
  }
  html { scroll-behavior: smooth; }
  body { background: var(--black); color: var(--cream); font-family: 'Montserrat', sans-serif; font-weight: 300; overflow-x: hidden; }

  /* NAV */
  nav { position: fixed; top: 0; left: 0; right: 0; z-index: 100; display: flex; align-items: center; justify-content: space-between; padding: 24px 60px; background: linear-gradient(to bottom, rgba(8,8,8,0.95) 0%, transparent 100%); transition: background 0.4s; }
  nav.scrolled { background: rgba(8,8,8,0.97); border-bottom: 1px solid rgba(184,151,42,0.15); }
  .nav-logo { display: flex; align-items: center; gap: 10px; font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 300; letter-spacing: 6px; color: var(--gold-light); text-decoration: none; text-transform: uppercase; }
  .nav-logo img { width: 38px; height: 38px; border-radius: 50%; object-fit: cover; }
  .nav-links { display: flex; gap: 40px; list-style: none; }
  .nav-links a { color: var(--cream2); font-size: 10px; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; transition: color 0.3s; position: relative; }
  .nav-links a::after { content: ''; position: absolute; bottom: -4px; left: 0; right: 0; height: 1px; background: var(--gold); transform: scaleX(0); transition: transform 0.3s; transform-origin: left; }
  .nav-links a:hover { color: var(--gold-light); }
  .nav-links a:hover::after { transform: scaleX(1); }
  .nav-book { font-size: 10px; letter-spacing: 3px; text-transform: uppercase; text-decoration: none; color: var(--black); background: var(--gold); padding: 10px 24px; transition: background 0.3s; }
  .nav-book:hover { background: var(--gold-light); }
