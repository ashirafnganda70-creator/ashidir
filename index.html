<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shuffle Gents Barber</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial, sans-serif;
}

body{
background:black;
color:white;
overflow-x:hidden;
}

.hero{
height:100vh;
background:url('https://images.unsplash.com/photo-1621605815971-fbc98d665033?q=80&w=1200&auto=format&fit=crop') center/cover;
display:flex;
align-items:center;
justify-content:center;
text-align:center;
position:relative;
}

.hero::after{
content:'';
position:absolute;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.65);
}

.hero-content{
position:relative;
z-index:2;
}

.hero h1{
font-size:60px;
letter-spacing:4px;
}

.hero p{
margin-top:15px;
font-size:20px;
color:#ddd;
}

.btn{
display:inline-block;
margin-top:25px;
padding:15px 35px;
background:#c0392b;
color:white;
text-decoration:none;
border-radius:10px;
font-weight:bold;
}

.section{
padding:70px 20px;
text-align:center;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:20px;
margin-top:40px;
}

.card{
background:#111;
border-radius:20px;
overflow:hidden;
}

.card img{
width:100%;
height:250px;
object-fit:cover;
}

.card h3{
padding:15px;
}

footer{
padding:30px;
text-align:center;
background:#111;
margin-top:50px;
}
</style>
</head>

<body>

<section class="hero">
<div class="hero-content">
<h1>SHUFFLE GENTS BARBER</h1>
<p>Luxury Grooming Experience</p>
<a href="#" class="btn">BOOK NOW</a>
</div>
</section>

<section class="section">
<h2>Our Services</h2>

<div class="cards">

<div class="card">
<img src="https://images.unsplash.com/photo-1517832606299-7ae9b720a186?q=80&w=1200&auto=format&fit=crop">
<h3>Premium Haircut</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1622286342621-4bd786c2447c?q=80&w=1200&auto=format&fit=crop">
<h3>Beard Styling</h3>
</div>

<div class="card">
<img src="https://images.unsplash.com/photo-1503951914875-452162b0f3f1?q=80&w=1200&auto=format&fit=crop">
<h3>Luxury Treatment</h3>
</div>

</div>
</section>

<footer>
© 2026 Shuffle Gents Barber
</footer>

</body>
</html>
